      <rect x="302" y="570" width="100" height="66" rx="10"/>
      <rect x="472" y="526" width="100" height="110" rx="10"/>
      <rect x="642" y="482" width="100" height="154" rx="10"/>
      <rect x="812" y="414" width="100" height="222" rx="10"/>
      <rect x="982" y="328" width="100" height="308" rx="10"/>
      <rect x="1152" y="246" width="100" height="390" rx="10"/>
