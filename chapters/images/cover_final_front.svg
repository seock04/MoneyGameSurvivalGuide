  <text x="900" y="705" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="92" font-weight="800" fill="#17383f">대충 뛰어들어</text>
  <text x="900" y="832" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="92" font-weight="800" fill="#17383f">끝까지 살아남기</text>

  <rect x="360" y="2188" width="1080" height="168" rx="84" fill="#1d4d4a"/>
  <text x="900" y="2260" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="42" font-weight="700" fill="#f8f3ea">대박보다 오래 살아남는 돈 관리</text>
  <text x="900" y="2318" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="42" font-weight="700" fill="#f8f3ea">시스템을 선택하는 법</text>

  <text x="900" y="2472" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="52" font-weight="700" fill="#17383f">호호 코치 최호석</text>
