<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2700" viewBox="0 0 1800 2700" role="img" aria-labelledby="title desc">
  <title id="title">부의 게임, 대충 뛰어들어 끝까지 살아남기</title>
  <desc id="desc">작은 시작, 오래 지속하는 돈 관리 시스템, 나침반과 재무 도구를 담은 출간용 앞표지 벡터 원본</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f1e7"/>
      <stop offset="50%" stop-color="#efe5d5"/>
      <stop offset="100%" stop-color="#dde8df"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4d4a"/>
      <stop offset="100%" stop-color="#17383f"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#17383f" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1800" height="2700" fill="url(#paper)"/>
  <rect x="94" y="94" width="1612" height="2512" rx="44" fill="none" stroke="#1d4d4a" stroke-width="8"/>
  <rect x="132" y="132" width="1536" height="2436" rx="34" fill="none" stroke="#c9974d" stroke-width="3" opacity="0.72"/>

