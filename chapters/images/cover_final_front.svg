  <text x="900" y="415" text-anchor="middle" font-family="Apple SD Gothic Neo, Noto Sans CJK KR, sans-serif" font-size="64" font-weight="700" fill="#1d4d4a" letter-spacing="2">완벽한 준비보다 작은 시작을</text>
