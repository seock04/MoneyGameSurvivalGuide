    <path d="M760 1690 V2180"/>
    <path d="M960 1690 V2180"/>
    <path d="M1160 1690 V2180"/>
    <path d="M1360 1690 V2180"/>
  </g>

  <g transform="translate(235 1268)" filter="url(#softShadow)">
    <rect x="0" y="0" width="1330" height="760" rx="36" fill="url(#board)"/>
    <rect x="58" y="58" width="1214" height="644" rx="24" fill="#f8f3ea"/>
    <path d="M130 532 C270 432 364 454 480 352 C606 242 690 306 810 208 C920 120 1016 158 1178 104" fill="none" stroke="#1d4d4a" stroke-width="18" stroke-linecap="round"/>
